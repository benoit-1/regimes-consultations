    :root {
        --bleu: #0288d1;
        --bleu-clair: #e3f2fd;

    th, td {

        font-size: 12.5px;

    tr:last-child td { border-bottom: none; }

        padding: 24px 10px;

    .msg-chargement {

        padding: 40px 10px;
        font-size: 14px;
    }
    .msg-erreur {
        background: var(--rouge-clair);
        color: var(--rouge);
        border-radius: 8px;
        padding: 14px;
        font-size: 13.5px;
        font-weight: 600;
    }

    .btn-action {
        display: block;

        font-size: 15px;
        font-weight: 700;

        margin-bottom: 10px;

        font-size: 14.5px;

        font-weight: 700;
        color: var(--gris-txt);
        margin-bottom: 5px;

    .alerte-item {
        background: var(--rouge-clair);
        border: 1.5px solid #ef9a9a;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
        font-size: 13.5px;
        white-space: nowrap;
        overflow-x: auto;

    .alerte-item b { color: var(--rouge); }
    .alerte-mot {

        background: var(--rouge);
        color: white;
        border-radius: 6px;
        padding: 1px 7px;
        font-size: 12px;
        font-weight: 700;
        margin-left: 4px;

    .ok-item {

        border: 1.5px solid #80cbc4;
        border-radius: 8px;
        padding: 14px;
        text-align: center;
        color: var(--vert);

        border: 1.5px solid var(--gris-bord);
        border-radius: 20px;

        font-size: 13px;
        font-weight: 700;

<script>
    // ===== CONFIG SUPABASE (lecture seule) =====
    var SUPABASE_URL = "https://gsalxwgyfysxzixrbkmm.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzYWx4d2d5ZnlzeHppeHJia21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTE0NDQsImV4cCI6MjA5Njg4NzQ0NH0.cKvySEb-4ieqsZxtLlf6sB_0RY475DFhMrYh2JAYZjg";

    var _sb = null;
    var _residents = [];
    var _rappelTexturePdf = "";
    var _nomEtab = "";

    function normaliser(txt) {
        return (txt || "")
            .toString()
            .toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // enlève les accents
    }

    // Liste des ingrédients déjà validés en étiquettes
    var _ingredientsSaisis = [];

    function rendreEtiquettes() {
        var zone = document.getElementById("apercuIngredients");
        zone.innerHTML = _ingredientsSaisis.map(function (ing, idx) {
            return "<span class='puce-tag'>" + escapeHtml(ing) +
                "<button type='button' onclick='retirerIngredient(" + idx + ")' aria-label='Retirer'>✕</button></span>";
        }).join("");
    }

    function ajouterIngredientDepuisTexte(texte) {
        var val = (texte || "").trim();
        if (!val) return;
        _ingredientsSaisis.push(val);
        rendreEtiquettes();
    }

    function retirerIngredient(idx) {
        _ingredientsSaisis.splice(idx, 1);
        rendreEtiquettes();
    }

    // Ajoute automatiquement une étiquette dès qu'une virgule est tapée
    // (pas besoin d'appuyer sur Entrée si on tape une virgule)
    function gererSaisieVirgule() {
        var input = document.getElementById("inputIngredients");
        if (input.value.indexOf(",") !== -1) {
            var morceaux = input.value.split(",");
            var dernier = morceaux.pop(); // ce qui suit la dernière virgule reste dans le champ
            morceaux.forEach(function (m) { ajouterIngredientDepuisTexte(m); });
            input.value = dernier;
        }
    }

    // Entrée, virgule ou espace = valider l'ingrédient en cours et l'ajouter en étiquette
    function gererToucheIngredient(event) {
        var input = document.getElementById("inputIngredients");
        if (event.key === "Enter" || event.key === "," || event.key === " ") {
            event.preventDefault();
            ajouterIngredientDepuisTexte(input.value);
            input.value = "";
        } else if (event.key === "Backspace" && input.value === "" && _ingredientsSaisis.length > 0) {
            // Efface la dernière étiquette si le champ est vide et qu'on appuie sur Retour arrière
            retirerIngredient(_ingredientsSaisis.length - 1);
        }
    }

    // Distance de Levenshtein — conservée mais désormais inutilisée pour la comparaison
    // (retirée sur demande car elle générait de faux positifs alimentaires)
    function distanceLevenshtein(a, b) {
        var m = a.length, n = b.length;
        if (m === 0) return n;
        if (n === 0) return m;
        var d = [];
        for (var i = 0; i <= m; i++) d.push([i]);
        for (var j = 0; j <= n; j++) d[0][j] = j;
        for (i = 1; i <= m; i++) {
            for (j = 1; j <= n; j++) {
                var cout = a[i - 1] === b[j - 1] ? 0 : 1;
                d[i][j] = Math.min(
                    d[i - 1][j] + 1,      // suppression
                    d[i][j - 1] + 1,      // insertion
                    d[i - 1][j - 1] + cout // substitution
                );
            }
        }
        return d[m][n];
    }

    // Vérifie si l'ingrédient apparaît dans le texte — correspondance exacte uniquement
    // (pas de correction automatique, pour éviter tout faux positif)
    function contientAvecTolerance(texteNorm, ingredientNorm) {
        if (!texteNorm || !ingredientNorm) return false;
        return texteNorm.indexOf(ingredientNorm) !== -1;
    }

    async function init() {
        try {
            _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            afficherErreurGlobale("Impossible d'initialiser la connexion. Vérifiez votre connexion internet.");
            return;
        }
        await chargerDonnees();
    }

    async function chargerDonnees() {
        try {
            var res = await _sb.from("donnees_ehpad")
                .select("residents, rappel_texture, nom_etab")
                .eq("etab_id", ETAB_ID)
                .single();

            if (res.error) {
                afficherErreurGlobale("Erreur de chargement des données. Réessayez dans un instant.");
                console.log("Erreur Supabase:", res.error);
                return;
            }

            var d = res.data || {};
            _residents = Array.isArray(d.residents) ? d.residents : [];
            _rappelTexturePdf = d.rappel_texture || "";
            _nomEtab = d.nom_etab || "";

            if (_nomEtab) {
                document.getElementById("nomEtabAffiche").textContent = _nomEtab + " — Consultation en lecture seule";
            }

            afficherFeuilleRegimes();
            afficherRappelTextureInfo();
        } catch (e) {
            afficherErreurGlobale("Erreur inattendue lors du chargement des données.");
            console.log(e);
        }
    }

    function afficherErreurGlobale(msg) {
        document.getElementById("msgGlobal").innerHTML =
            "<div class='msg-erreur' style='margin-bottom:16px;'>⚠️ " + msg + "</div>";
        document.getElementById("zoneRegimes").innerHTML = "<div class='msg-vide'>Données indisponibles pour le moment.</div>";
        document.getElementById("zoneTextureInfo").textContent = "Document indisponible pour le moment.";
    }

    // ===== ONGLETS =====
    function changerOnglet(nom) {
        document.querySelectorAll(".onglet-btn").forEach(function (b) {
            b.classList.toggle("actif", b.dataset.onglet === nom);
        });
        document.querySelectorAll(".panneau").forEach(function (p) {
            p.classList.toggle("actif", p.id === "panneau-" + nom);
        });
    }

    // ===== PANNEAU 1 : FEUILLE REGIMES =====
    function residentsPresents() {
        return _residents.filter(function (r) {
            var statut = r.statut || "Présent";
            return statut === "Présent";
        });
    }

    function extraireRegime(r) {
        var regime = r._rawRegime || "";
        if (!regime && r.profil) {
            var match = r.profil.match(/Régime\s*:\s*([^/]+)/i);
            if (match) regime = match[1].trim();
            else if (!r.profil.includes("Aucun") && r.profil.trim() !== "") regime = r.profil.split("/")[0].trim();
        }
        return (regime || "").trim();
    }

    function afficherFeuilleRegimes() {
        var presents = residentsPresents();
        var listeRegimes = presents.filter(function (r) {
            var regime = extraireRegime(r);
            return regime && regime.toLowerCase() !== "aucun";
        }).map(function (r) {
            return Object.assign({}, r, { _regimeExtrait: extraireRegime(r) });
        });

        var zone = document.getElementById("zoneRegimes");

        if (listeRegimes.length === 0) {
            zone.innerHTML = "<div class='msg-vide'>Aucun résident présent avec un régime médical spécifique actuellement.</div>";
            return;
        }

        var unites = [];
        listeRegimes.forEach(function (r) {
            var u = r.unite || "Non précisé";
            if (unites.indexOf(u) === -1) unites.push(u);
        });

        var html = "";
        unites.forEach(function (unite) {
            var listeUnite = listeRegimes.filter(function (r) { return (r.unite || "Non précisé") === unite; });
            listeUnite.sort(function (a, b) {
                return (a.chambre || "").toString().localeCompare((b.chambre || "").toString(), 'fr', { numeric: true });
            });

            html += "<div class='section-titre'>🏢 " + escapeHtml(unite) + "</div>";
            html += "<table><thead><tr><th>Chambre</th><th>Texture</th><th>Régime</th></tr></thead><tbody>";
            listeUnite.forEach(function (r) {
                var texMidi = r.textureMidi || "Normal";
                var texSoir = r.textureSoir || "Normal";
                var texteTexture = texMidi === texSoir ? texMidi : ("Midi: " + texMidi + " / Soir: " + texSoir);
                var couleurTexture = (texMidi !== "Normal" || texSoir !== "Normal") ? "color:var(--bleu-fonce);" : "";
                html += "<tr>" +
                    "<td><b>Ch. " + escapeHtml(r.chambre || "") + "</b></td>" +
                    "<td class='badge-tex' style='" + couleurTexture + "'>" + escapeHtml(texteTexture) + "</td>" +
                    "<td><b>" + escapeHtml(r._regimeExtrait) + "</b></td>" +
                    "</tr>";
            });
            html += "</tbody></table>";
        });

        zone.innerHTML = html;
    }

    // ===== PANNEAU 2 : VERIFIER UN MENU =====
    function verifierMenu() {
        // Inclut l'étiquette en cours de frappe (au cas où l'utilisateur n'a pas validé le dernier mot)
        var enCours = document.getElementById("inputIngredients").value;
        if (enCours && enCours.trim()) {
            ajouterIngredientDepuisTexte(enCours);
            document.getElementById("inputIngredients").value = "";
        }
        var ingredients = _ingredientsSaisis.slice();

        var zone = document.getElementById("zoneResultatVerif");
        zone.style.display = "block";

        if (ingredients.length === 0) {
            zone.innerHTML = "<div class='msg-vide'>Ajoutez au moins un ingrédient.</div>";
            return;
        }

        var presents = residentsPresents();
        var alertesMap = {}; // clé = chambre + mot -> alerte fusionnée

        // Vider les étiquettes maintenant que les ingrédients ont été récupérés,
        // pour permettre une nouvelle saisie directe sans avoir à effacer
        _ingredientsSaisis = [];
        rendreEtiquettes();

        presents.forEach(function (r) {
            var regimeBrut = extraireRegime(r);
            var aversionBrut = r._rawAversion || "";
            var regime = normaliser(regimeBrut);
            var aversion = normaliser(aversionBrut);
            var chambre = r.chambre || "?";
            var unite = r.unite || "";
            var texMidi = r.textureMidi || "Normal";
            var texSoir = r.textureSoir || "Normal";
            var texteTexture = texMidi === texSoir ? texMidi : ("Midi: " + texMidi + " / Soir: " + texSoir);

            ingredients.forEach(function (ing) {
                var ingNorm = normaliser(ing);
                if (!ingNorm) return;

                var sources = [];
                var matchRegime = contientAvecTolerance(regime, ingNorm);
                var matchAversion = contientAvecTolerance(aversion, ingNorm);
                if (matchRegime && matchAversion && regimeBrut.trim().toLowerCase() === aversionBrut.trim().toLowerCase()) {
                    // Même donnée dans régime et aversion : une seule mention pour rester sur une ligne
                    sources.push("régime/aversion : " + regimeBrut);
                } else {
                    if (matchRegime) sources.push("régime : " + regimeBrut);
                    if (matchAversion) sources.push("aversion : " + aversionBrut);
                }
                if (sources.length === 0) return;

                var cle = chambre + "|||" + ing.toLowerCase();
                if (!alertesMap[cle]) {
                    alertesMap[cle] = { chambre: chambre, unite: unite, mot: ing, texture: texteTexture, sources: [] };
                }
                sources.forEach(function (s) {
                    if (alertesMap[cle].sources.indexOf(s) === -1) alertesMap[cle].sources.push(s);
                });
            });
        });

        var alertes = Object.keys(alertesMap).map(function (k) { return alertesMap[k]; });

        if (alertes.length === 0) {
            zone.innerHTML = "<div class='ok-item'>✅ Aucune incompatibilité détectée avec les régimes et aversions des résidents présents.</div>";
            return;
        }

        var html = "<div class='section-titre' style='margin-top:0;'>⚠️ " + alertes.length + " alerte(s) détectée(s)</div>";
        alertes.forEach(function (a) {
            var texStyle = a.texture !== "Normal" ? "font-weight:700;color:var(--bleu-fonce);" : "";
            html += "<div class='alerte-item'>" +
                "<span style='" + texStyle + "'>" + escapeHtml(a.texture) + "</span>, " +
                "<b>Ch. " + escapeHtml(a.chambre) + "</b>" + (a.unite ? " — " + escapeHtml(a.unite) : "") +
                " — " + escapeHtml(a.sources.join(" / ")) +
                "<span class='alerte-mot'>" + escapeHtml(a.mot) + "</span>" +
                "</div>";
        });
        zone.innerHTML = html;
    }

    // ===== PANNEAU 3 : RAPPEL TEXTURE =====
    function afficherRappelTextureInfo() {
        var info = document.getElementById("zoneTextureInfo");
        var btn = document.getElementById("btnOuvrirPdf");
        if (_rappelTexturePdf) {
            info.textContent = "Document de rappel des textures alimentaires disponible.";
            btn.style.display = "block";
        } else {
            info.textContent = "Aucun document de rappel texture n'a été mis en ligne pour le moment.";
            btn.style.display = "none";
        }
    }

    function ouvrirPdfTexture() {
        if (!_rappelTexturePdf) return;
        try {
            var parts = _rappelTexturePdf.split(",");
            var byteString = atob(parts[1]);
            var mimeMatch = parts[0].match(/data:(.*?);base64/);
            var mimeType = mimeMatch ? mimeMatch[1] : "application/pdf";
            var ab = new ArrayBuffer(byteString.length);
            var ia = new Uint8Array(ab);
            for (var i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            var blob = new Blob([ab], { type: mimeType });
            var url = URL.createObjectURL(blob);
            window.open(url, "_blank");
        } catch (e) {
            window.open(_rappelTexturePdf, "_blank");
        }
    }

    // ===== UTILITAIRES =====
    function escapeHtml(str) {
        return (str || "").toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    init();
</script>
