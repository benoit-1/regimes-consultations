<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Régimes &amp; Texture — Consultation</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
    :root {
        --bleu: #0288d1;
        --bleu-clair: #e3f2fd;
        --bleu-fonce: #1565c0;
        --vert: #00796b;
        --vert-clair: #e0f2f1;
        --rouge: #c62828;
        --rouge-clair: #ffebee;
        --gris-fond: #f0f7ff;
        --gris-bord: #bbdefb;
        --gris-txt: #546e7a;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--gris-fond);
        color: #263238;
        padding-bottom: 40px;
    }
    header {
        background: var(--bleu-fonce);
        color: white;
        padding: 18px 16px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 {
        margin: 0;
        font-size: 19px;
    }
    header .sous-titre {
        font-size: 12.5px;
        opacity: 0.85;
        margin-top: 4px;
    }
    .conteneur {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
    }
    .onglets {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
        flex-wrap: wrap;
    }
    .onglet-btn {
        flex: 1;
        min-width: 140px;
        background: white;
        border: 1.5px solid var(--gris-bord);
        border-radius: 10px;
        padding: 12px 10px;
        font-size: 13.5px;
        font-weight: 700;
        color: var(--gris-txt);
        cursor: pointer;
        text-align: center;
    }
    .onglet-btn.actif {
        background: var(--bleu-fonce);
        border-color: var(--bleu-fonce);
        color: white;
    }
    .panneau { display: none; }
    .panneau.actif { display: block; }

    .carte {
        background: white;
        border-radius: 12px;
        border: 1.5px solid var(--gris-bord);
        padding: 16px;
        margin-bottom: 16px;
    }
    .section-titre {
        font-weight: 800;
        color: var(--bleu-fonce);
        font-size: 15px;
        margin: 18px 0 8px;
        padding-bottom: 6px;
        border-bottom: 2px solid var(--bleu-clair);
    }
    .section-titre:first-child { margin-top: 0; }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
        margin-bottom: 4px;
    }
    th, td {
        padding: 9px 8px;
        text-align: left;
        border-bottom: 1px solid var(--gris-bord);
    }
    th {
        background: var(--bleu-clair);
        color: var(--bleu-fonce);
        font-weight: 700;
        font-size: 12.5px;
    }
    tr:last-child td { border-bottom: none; }

    .msg-vide {
        text-align: center;
        color: var(--gris-txt);
        font-style: italic;
        padding: 24px 10px;
        font-size: 14px;
    }
    .msg-chargement {
        text-align: center;
        color: var(--gris-txt);
        padding: 40px 10px;
        font-size: 14px;
    }
    .msg-erreur {
        background: var(--rouge-clair);
        color: var(--rouge);
        border-radius: 8px;
        padding: 14px;
        font-size: 13.5px;
        font-weight: 600;
    }

    .btn-action {
        display: block;
        width: 100%;
        background: var(--bleu);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 10px;
    }
    .btn-action:active { filter: brightness(0.92); }

    textarea, input[type=text] {
        width: 100%;
        border: 1.5px solid var(--gris-bord);
        border-radius: 8px;
        padding: 11px;
        font-size: 14.5px;
        font-family: inherit;
        resize: vertical;
    }
    label.form-label {
        display: block;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--gris-txt);
        margin-bottom: 5px;
    }

    .alerte-item {
        background: var(--rouge-clair);
        border: 1.5px solid #ef9a9a;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
        font-size: 13.5px;
    }
    .alerte-item b { color: var(--rouge); }
    .alerte-mot {
        display: inline-block;
        background: var(--rouge);
        color: white;
        border-radius: 6px;
        padding: 1px 7px;
        font-size: 12px;
        font-weight: 700;
        margin-left: 4px;
    }
    .ok-item {
        background: var(--vert-clair);
        border: 1.5px solid #80cbc4;
        border-radius: 8px;
        padding: 14px;
        text-align: center;
        color: var(--vert);
        font-weight: 700;
        font-size: 14px;
    }
    .badge-tex {
        font-weight: 700;
    }
    footer {
        text-align: center;
        font-size: 11.5px;
        color: var(--gris-txt);
        margin-top: 24px;
        padding: 0 20px;
    }
</style>
</head>
<body>

<header>
    <h1>🍽️ Régimes &amp; Texture</h1>
    <div class="sous-titre" id="nomEtabAffiche">Consultation en lecture seule</div>
</header>

<div class="conteneur">

    <div class="onglets">
        <button class="onglet-btn actif" data-onglet="regimes" onclick="changerOnglet('regimes')">📋 Feuille Régimes</button>
        <button class="onglet-btn" data-onglet="verifier" onclick="changerOnglet('verifier')">🔍 Vérifier un menu</button>
        <button class="onglet-btn" data-onglet="texture" onclick="changerOnglet('texture')">📄 Rappel Texture</button>
    </div>

    <div id="msgGlobal"></div>

    <!-- PANNEAU 1 : FEUILLE REGIMES -->
    <div class="panneau actif" id="panneau-regimes">
        <div class="carte" id="zoneRegimes">
            <div class="msg-chargement">Chargement des données…</div>
        </div>
    </div>

    <!-- PANNEAU 2 : VERIFIER UN MENU -->
    <div class="panneau" id="panneau-verifier">
        <div class="carte">
            <label class="form-label">Ingrédients du menu (séparés par des virgules)</label>
            <textarea id="inputIngredients" rows="3" placeholder="Ex : riz, poisson, piment"></textarea>
            <button class="btn-action" style="margin-top:12px;" onclick="verifierMenu()">🔍 Vérifier</button>
        </div>
        <div class="carte" id="zoneResultatVerif" style="display:none;"></div>
    </div>

    <!-- PANNEAU 3 : RAPPEL TEXTURE -->
    <div class="panneau" id="panneau-texture">
        <div class="carte" style="text-align:center;">
            <div style="font-size:50px;margin-bottom:10px;">📄</div>
            <div id="zoneTextureInfo" style="color:var(--gris-txt);font-size:13.5px;margin-bottom:16px;">Chargement…</div>
            <button class="btn-action" id="btnOuvrirPdf" style="display:none;" onclick="ouvrirPdfTexture()">👁️ Ouvrir le document</button>
        </div>
    </div>

</div>

<footer>
    Accès public en lecture seule — aucune donnée n'est modifiable depuis cette page.<br>
    Les noms des résidents ne sont pas affichés.
</footer>

<script>
    // ===== CONFIG SUPABASE (lecture seule) =====
    var SUPABASE_URL = "https://gsalxwgyfysxzixrbkmm.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzYWx4d2d5ZnlzeHppeHJia21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTE0NDQsImV4cCI6MjA5Njg4NzQ0NH0.cKvySEb-4ieqsZxtLlf6sB_0RY475DFhMrYh2JAYZjg";
    var ETAB_ID = "ehpad-principal";

    var _sb = null;
    var _residents = [];
    var _rappelTexturePdf = "";
    var _nomEtab = "";

    function normaliser(txt) {
        return (txt || "")
            .toString()
            .toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // enlève les accents
    }

    async function init() {
        try {
            _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            afficherErreurGlobale("Impossible d'initialiser la connexion. Vérifiez votre connexion internet.");
            return;
        }
        await chargerDonnees();
    }

    async function chargerDonnees() {
        try {
            var res = await _sb.from("donnees_ehpad")
                .select("residents, rappel_texture, nom_etab")
                .eq("etab_id", ETAB_ID)
                .single();

            if (res.error) {
                afficherErreurGlobale("Erreur de chargement des données. Réessayez dans un instant.");
                console.log("Erreur Supabase:", res.error);
                return;
            }

            var d = res.data || {};
            _residents = Array.isArray(d.residents) ? d.residents : [];
            _rappelTexturePdf = d.rappel_texture || "";
            _nomEtab = d.nom_etab || "";

            if (_nomEtab) {
                document.getElementById("nomEtabAffiche").textContent = _nomEtab + " — Consultation en lecture seule";
            }

            afficherFeuilleRegimes();
            afficherRappelTextureInfo();
        } catch (e) {
            afficherErreurGlobale("Erreur inattendue lors du chargement des données.");
            console.log(e);
        }
    }

    function afficherErreurGlobale(msg) {
        document.getElementById("msgGlobal").innerHTML =
            "<div class='msg-erreur' style='margin-bottom:16px;'>⚠️ " + msg + "</div>";
        document.getElementById("zoneRegimes").innerHTML = "<div class='msg-vide'>Données indisponibles pour le moment.</div>";
        document.getElementById("zoneTextureInfo").textContent = "Document indisponible pour le moment.";
    }

    // ===== ONGLETS =====
    function changerOnglet(nom) {
        document.querySelectorAll(".onglet-btn").forEach(function (b) {
            b.classList.toggle("actif", b.dataset.onglet === nom);
        });
        document.querySelectorAll(".panneau").forEach(function (p) {
            p.classList.toggle("actif", p.id === "panneau-" + nom);
        });
    }

    // ===== PANNEAU 1 : FEUILLE REGIMES =====
    function residentsPresents() {
        return _residents.filter(function (r) {
            var statut = r.statut || "Présent";
            return statut === "Présent";
        });
    }

    function extraireRegime(r) {
        var regime = r._rawRegime || "";
        if (!regime && r.profil) {
            var match = r.profil.match(/Régime\s*:\s*([^/]+)/i);
            if (match) regime = match[1].trim();
            else if (!r.profil.includes("Aucun") && r.profil.trim() !== "") regime = r.profil.split("/")[0].trim();
        }
        return (regime || "").trim();
    }

    function afficherFeuilleRegimes() {
        var presents = residentsPresents();
        var listeRegimes = presents.filter(function (r) {
            var regime = extraireRegime(r);
            return regime && regime.toLowerCase() !== "aucun";
        }).map(function (r) {
            return Object.assign({}, r, { _regimeExtrait: extraireRegime(r) });
        });

        var zone = document.getElementById("zoneRegimes");

        if (listeRegimes.length === 0) {
            zone.innerHTML = "<div class='msg-vide'>Aucun résident présent avec un régime médical spécifique actuellement.</div>";
            return;
        }

        var unites = [];
        listeRegimes.forEach(function (r) {
            var u = r.unite || "Non précisé";
            if (unites.indexOf(u) === -1) unites.push(u);
        });

        var html = "";
        unites.forEach(function (unite) {
            var listeUnite = listeRegimes.filter(function (r) { return (r.unite || "Non précisé") === unite; });
            listeUnite.sort(function (a, b) {
                return (a.chambre || "").toString().localeCompare((b.chambre || "").toString(), 'fr', { numeric: true });
            });

            html += "<div class='section-titre'>🏢 " + escapeHtml(unite) + "</div>";
            html += "<table><thead><tr><th>Chambre</th><th>Texture</th><th>Régime</th></tr></thead><tbody>";
            listeUnite.forEach(function (r) {
                var texMidi = r.textureMidi || "Normal";
                var texSoir = r.textureSoir || "Normal";
                var texteTexture = texMidi === texSoir ? texMidi : ("Midi: " + texMidi + " / Soir: " + texSoir);
                var couleurTexture = (texMidi !== "Normal" || texSoir !== "Normal") ? "color:var(--bleu-fonce);" : "";
                html += "<tr>" +
                    "<td><b>Ch. " + escapeHtml(r.chambre || "") + "</b></td>" +
                    "<td class='badge-tex' style='" + couleurTexture + "'>" + escapeHtml(texteTexture) + "</td>" +
                    "<td><b>" + escapeHtml(r._regimeExtrait) + "</b></td>" +
                    "</tr>";
            });
            html += "</tbody></table>";
        });

        zone.innerHTML = html;
    }

    // ===== PANNEAU 2 : VERIFIER UN MENU =====
    function verifierMenu() {
        var texte = document.getElementById("inputIngredients").value || "";
        var ingredients = texte.split(",").map(function (s) { return s.trim(); }).filter(Boolean);

        var zone = document.getElementById("zoneResultatVerif");
        zone.style.display = "block";

        if (ingredients.length === 0) {
            zone.innerHTML = "<div class='msg-vide'>Saisissez au moins un ingrédient, séparé par des virgules.</div>";
            return;
        }

        var presents = residentsPresents();
        var alertes = [];

        presents.forEach(function (r) {
            var regime = normaliser(extraireRegime(r));
            var aversion = normaliser(r._rawAversion || "");
            var chambre = r.chambre || "?";
            var unite = r.unite || "";

            ingredients.forEach(function (ing) {
                var ingNorm = normaliser(ing);
                if (!ingNorm) return;

                if (regime && regime.indexOf(ingNorm) !== -1) {
                    alertes.push({ chambre: chambre, unite: unite, mot: ing, type: "régime : " + extraireRegime(r) });
                }
                if (aversion && aversion.indexOf(ingNorm) !== -1) {
                    alertes.push({ chambre: chambre, unite: unite, mot: ing, type: "aversion : " + (r._rawAversion || "") });
                }
            });
        });

        if (alertes.length === 0) {
            zone.innerHTML = "<div class='ok-item'>✅ Aucune incompatibilité détectée avec les régimes et aversions des résidents présents.</div>";
            return;
        }

        var html = "<div class='section-titre' style='margin-top:0;'>⚠️ " + alertes.length + " alerte(s) détectée(s)</div>";
        alertes.forEach(function (a) {
            html += "<div class='alerte-item'>" +
                "<b>Ch. " + escapeHtml(a.chambre) + "</b>" + (a.unite ? " — " + escapeHtml(a.unite) : "") +
                " — " + escapeHtml(a.type) +
                "<span class='alerte-mot'>" + escapeHtml(a.mot) + "</span>" +
                "</div>";
        });
        zone.innerHTML = html;
    }

    // ===== PANNEAU 3 : RAPPEL TEXTURE =====
    function afficherRappelTextureInfo() {
        var info = document.getElementById("zoneTextureInfo");
        var btn = document.getElementById("btnOuvrirPdf");
        if (_rappelTexturePdf) {
            info.textContent = "Document de rappel des textures alimentaires disponible.";
            btn.style.display = "block";
        } else {
            info.textContent = "Aucun document de rappel texture n'a été mis en ligne pour le moment.";
            btn.style.display = "none";
        }
    }

    function ouvrirPdfTexture() {
        if (!_rappelTexturePdf) return;
        try {
            var parts = _rappelTexturePdf.split(",");
            var byteString = atob(parts[1]);
            var mimeMatch = parts[0].match(/data:(.*?);base64/);
            var mimeType = mimeMatch ? mimeMatch[1] : "application/pdf";
            var ab = new ArrayBuffer(byteString.length);
            var ia = new Uint8Array(ab);
            for (var i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            var blob = new Blob([ab], { type: mimeType });
            var url = URL.createObjectURL(blob);
            window.open(url, "_blank");
        } catch (e) {
            window.open(_rappelTexturePdf, "_blank");
        }
    }

    // ===== UTILITAIRES =====
    function escapeHtml(str) {
        return (str || "").toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    init();
</script>

</body>
</html>
