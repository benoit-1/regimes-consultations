<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Administration — Accès QR 2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
    :root {
        --bleu-fonce: #1565c0;
        --vert: #00796b;
        --vert-clair: #e0f2f1;
        --rouge: #c62828;
        --rouge-clair: #ffebee;
        --gris-fond: #f0f7ff;
        --gris-bord: #bbdefb;
        --gris-txt: #546e7a;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--gris-fond);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .carte {
        background: white;
        border-radius: 14px;
        border: 1.5px solid var(--gris-bord);
        padding: 28px 24px;
        max-width: 380px;
        width: 100%;
        text-align: center;
    }
    h1 { font-size: 17px; color: var(--bleu-fonce); margin: 0 0 6px; }
    p.sous { font-size: 13px; color: var(--gris-txt); margin: 0 0 20px; }
    input[type=password] {
        width: 100%;
        border: 1.5px solid var(--gris-bord);
        border-radius: 8px;
        padding: 13px;
        font-size: 16px;
        text-align: center;
        letter-spacing: 3px;
        margin-bottom: 14px;
    }
    button {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: var(--bleu-fonce);
    }
    .msg-erreur {
        color: var(--rouge);
        font-size: 13px;
        margin-top: 10px;
    }
    .statut-box {
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 18px;
        font-weight: 700;
        font-size: 15px;
    }
    .statut-actif { background: var(--vert-clair); color: var(--vert); }
    .statut-inactif { background: var(--rouge-clair); color: var(--rouge); }
    .btn-desactiver { background: var(--rouge); }
    .btn-activer { background: var(--vert); }
    #zoneChargement { font-size: 13px; color: var(--gris-txt); }
</style>
</head>
<body>

<div class="carte" id="zonePrincipale">
    <h1>🔒 Administration — QR code 2</h1>
    <p class="sous">Entrez le code pour gérer l'accès</p>
    <input type="password" id="inputCode" placeholder="Code" inputmode="numeric" maxlength="10">
    <button onclick="verifierCode()">Déverrouiller</button>
    <div id="zoneErreur"></div>
</div>

<script>
    var SUPABASE_URL = "https://gsalxwgyfysxzixrbkmm.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzYWx4d2d5ZnlzeHppeHJia21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTE0NDQsImV4cCI6MjA5Njg4NzQ0NH0.cKvySEb-4ieqsZxtLlf6sB_0RY475DFhMrYh2JAYZjg";
    var ETAB_ID = "ehpad-principal";
    var CODE_ACCES = "0637";
    var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("inputCode").addEventListener("keydown", function (e) {
        if (e.key === "Enter") verifierCode();
    });

    function verifierCode() {
        var saisi = document.getElementById("inputCode").value;
        if (saisi === CODE_ACCES) {
            afficherPanneauAdmin();
        } else {
            document.getElementById("zoneErreur").innerHTML = "<div class='msg-erreur'>Code incorrect.</div>";
        }
    }

    function afficherPanneauAdmin() {
        document.getElementById("zonePrincipale").innerHTML =
            "<h1>🔒 Gestion de l'accès — QR code 2</h1>" +
            "<div id='zoneChargement'>Chargement du statut…</div>";
        chargerStatut();
    }

    async function chargerStatut() {
        try {
            var res = await _sb.from("acces_qr2").select("actif").eq("etab_id", ETAB_ID).single();
            var actif = res.data ? res.data.actif !== false : true;
            afficherStatut(actif);
        } catch (e) {
            document.getElementById("zoneChargement").innerHTML = "<div class='msg-erreur'>Erreur de chargement. Réessayez.</div>";
        }
    }

    function afficherStatut(actif) {
        var zone = document.getElementById("zonePrincipale");
        zone.innerHTML =
            "<h1>🔒 Gestion de l'accès — QR code 2</h1>" +
            "<div class='statut-box " + (actif ? "statut-actif" : "statut-inactif") + "'>" +
            (actif ? "✅ Accès actuellement ACTIVÉ" : "⛔ Accès actuellement DÉSACTIVÉ") +
            "</div>" +
            "<button class='" + (actif ? "btn-desactiver" : "btn-activer") + "' onclick='changerStatut(" + (!actif) + ")'>" +
            (actif ? "Désactiver le QR code 2" : "Réactiver le QR code 2") +
            "</button>" +
            "<div id='zoneErreur' style='margin-top:12px;'></div>";
    }

    async function changerStatut(nouvelEtat) {
        try {
            var res = await _sb.from("acces_qr2")
                .update({ actif: nouvelEtat, updated_at: new Date().toISOString() })
                .eq("etab_id", ETAB_ID);
            if (res.error) {
                document.getElementById("zoneErreur").innerHTML = "<div class='msg-erreur'>Erreur lors de la mise à jour. Réessayez.</div>";
                return;
            }
            afficherStatut(nouvelEtat);
        } catch (e) {
            document.getElementById("zoneErreur").innerHTML = "<div class='msg-erreur'>Erreur lors de la mise à jour. Réessayez.</div>";
        }
    }
</script>

</body>
</html>
